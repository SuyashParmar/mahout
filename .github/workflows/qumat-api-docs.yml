name: QuMat Python API Docs

on:
  push:
    branches: [main]
    paths:
      - "qumat/**.py"
      - "scripts/generate_qumat_api_docs.py"
      - "docs/qumat/api-autogen.md"
      - ".github/workflows/qumat-api-docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "qumat/**.py"
      - "scripts/generate_qumat_api_docs.py"
      - "docs/qumat/api-autogen.md"
      - ".github/workflows/qumat-api-docs.yml"
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Generate API docs
        run: uv run python scripts/generate_qumat_api_docs.py

      - name: Ensure generated docs are committed
        run: |
          if ! git diff --quiet -- docs/qumat/api-autogen.md; then
            echo "docs/qumat/api-autogen.md is stale. Run: uv run python scripts/generate_qumat_api_docs.py"
            git --no-pager diff -- docs/qumat/api-autogen.md
            exit 1
          fi

      - name: Upload API docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: qumat-python-api-docs
          path: docs/qumat/api-autogen.md
