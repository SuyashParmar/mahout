name: QDP Rustdoc

on:
  push:
    branches: [main]
    paths:
      - "qdp/**.rs"
      - "qdp/**/Cargo.toml"
      - "qdp/Cargo.lock"
      - ".github/workflows/qdp-rustdoc.yml"
      - "docs/qdp/**"
  pull_request:
    branches: [main]
    paths:
      - "qdp/**.rs"
      - "qdp/**/Cargo.toml"
      - "qdp/Cargo.lock"
      - ".github/workflows/qdp-rustdoc.yml"
      - "docs/qdp/**"
  workflow_dispatch:

jobs:
  rustdoc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build qdp-core rustdoc (no deps)
        working-directory: qdp
        run: cargo doc --package qdp-core --no-deps

      - name: Upload rustdoc artifact
        uses: actions/upload-artifact@v4
        with:
          name: qdp-core-rustdoc
          path: qdp/target/doc/qdp_core
